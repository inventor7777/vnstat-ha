<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>vnStat</title>
    <style>
      :root {
        --bg: #6b7280;
        --bg-deep: #4b5563;
        --panel: rgba(17, 24, 39, 0.72);
        --panel-strong: rgba(15, 23, 42, 0.86);
        --text: #f9fafb;
        --muted: #cbd5e1;
        --accent: #60a5fa;
        --line: rgba(148, 163, 184, 0.18);
        --glow: rgba(96, 165, 250, 0.24);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        font: 16px/1.5 "Avenir Next", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, rgba(96, 165, 250, 0.08), transparent 38%),
          linear-gradient(180deg, var(--bg), var(--bg-deep));
        display: grid;
        place-items: center;
      }

      main {
        width: min(1120px, calc(100vw - 32px));
        padding: 32px 0;
      }

      header {
        margin-bottom: 28px;
        text-align: center;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2.6rem, 6vw, 4.25rem);
        line-height: 0.9;
        letter-spacing: -0.04em;
      }

      p {
        margin: 8px 0 0;
        color: var(--muted);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 16px;
      }

      .card {
        background: var(--panel);
        backdrop-filter: blur(16px);
        border: 1px solid var(--line);
        border-radius: 24px;
        padding: 24px;
        box-shadow:
          0 0 0 1px rgba(96, 165, 250, 0.08),
          0 0 28px var(--glow),
          0 18px 40px rgba(15, 23, 42, 0.28);
      }

      .live-card {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0;
        min-height: 88px;
        padding: 0;
      }

      .stat-label {
        margin-top: 14px;
        color: var(--muted);
        font-size: 19px;
      }

      .stat-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .live-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        font-size: 22px;
        color: var(--text);
        white-space: nowrap;
        flex: 1 1 50%;
        min-height: 88px;
        padding: 18px 24px;
      }

      .live-label {
        color: var(--muted);
        min-width: 128px;
        text-align: center;
      }

      .live-value {
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      .live-separator {
        width: 1px;
        align-self: stretch;
        background: var(--line);
      }

      .stat-icon {
        width: 20px;
        height: 20px;
        flex: 0 0 20px;
        transform: translateY(-2px);
      }

      .stat-icon svg {
        display: block;
        width: 100%;
        height: 100%;
        fill: currentColor;
      }

      .stat-icon.up {
        color: #f87171;
      }

      .stat-icon.down {
        color: #60a5fa;
      }

      .stat-value {
        margin-top: 6px;
        font-size: clamp(2rem, 4.5vw, 2.9rem);
        font-weight: 700;
        letter-spacing: -0.04em;
      }

      .section {
        margin-top: 24px;
      }

      .meta {
        margin: 0 auto;
        max-width: 980px;
        color: var(--muted);
        font-size: 17px;
        line-height: 1.7;
      }

      footer {
        margin-top: 18px;
        text-align: center;
        color: var(--muted);
        font-size: 14px;
      }

      .error {
        color: #dbeafe;
        background: rgba(30, 41, 59, 0.72);
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 14px;
      }

      button {
        border: 1px solid rgba(96, 165, 250, 0.28);
        background: rgba(15, 23, 42, 0.78);
        color: var(--text);
        border-radius: 12px;
        padding: 10px 14px;
        font: inherit;
        cursor: pointer;
        box-shadow: 0 0 18px rgba(96, 165, 250, 0.12);
      }

      button:hover {
        background: rgba(30, 41, 59, 0.92);
      }

      button.active {
        border-color: rgba(96, 165, 250, 0.5);
        box-shadow: 0 0 22px rgba(96, 165, 250, 0.2);
      }

      pre {
        margin: 0;
        padding: 18px;
        overflow-x: auto;
        border-radius: 18px;
        background: rgba(2, 6, 23, 0.82);
        border: 1px solid var(--line);
        color: #dbeafe;
        font: 14px/1.5 "SFMono-Regular", "Menlo", "Consolas", monospace;
        white-space: pre-wrap;
      }

      h2 {
        margin: 0 0 10px;
        font-size: 1.35rem;
      }

      @media (max-width: 720px) {
        main {
          width: min(100vw - 20px, 1120px);
          padding: 20px 0;
        }

        .card {
          padding: 18px;
        }

        .meta {
          font-size: 15px;
        }

        .live-card {
          flex-direction: column;
          padding: 0;
        }

        .live-separator {
          display: block;
          width: 100%;
          height: 1px;
        }

        .live-row {
          font-size: 18px;
          min-height: 72px;
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>vnStat</h1>
        <div class="meta" id="meta"></div>
      </header>

      <section class="grid" id="summary"></section>

      <section class="section card live-card">
        <div class="live-row"><span id="live-up-icon"></span><span class="live-label">Live Upload</span><span class="live-value" id="live-up">Loading...</span></div>
        <div class="live-separator" aria-hidden="true"></div>
        <div class="live-row"><span id="live-down-icon"></span><span class="live-label">Live Download</span><span class="live-value" id="live-down">Loading...</span></div>
      </section>

      <section class="section card">
        <h2>CLI output</h2>
        <div class="toolbar">
          <button id="show-normal" class="active" type="button">vnStat Normal</button>
          <button id="show-json" type="button">vnStat JSON</button>
        </div>
        <pre id="cli-output">Loading...</pre>
      </section>

      <footer id="footer"></footer>
    </main>

    <script>
      const formatBytes = (value) => {
        if (value === undefined || value === null) return "n/a";
        const units = ["B", "KiB", "MiB", "GiB", "TiB", "PiB"];
        let size = Number(value);
        let unitIndex = 0;

        while (size >= 1024 && unitIndex < units.length - 1) {
          size /= 1024;
          unitIndex += 1;
        }

        const digits = size >= 100 || unitIndex === 0 ? 0 : size >= 10 ? 1 : 2;
        return `${size.toFixed(digits)} ${units[unitIndex]}`;
      };

      const cards = [
        { label: "Today", source: (traffic) => traffic.day?.[traffic.day.length - 1] },
        { label: "Current Month", source: (traffic) => traffic.month?.[traffic.month.length - 1] },
        { label: "All Time", source: (traffic) => traffic.total },
      ];

      const uploadIcon = `
        <span class="stat-icon up" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M15,20A1,1 0 0,0 14,19H13V17H17A2,2 0 0,0 19,15V5A2,2 0 0,0 17,3H7A2,2 0 0,0 5,5V15A2,2 0 0,0 7,17H11V19H10A1,1 0 0,0 9,20H2V22H9A1,1 0 0,0 10,23H14A1,1 0 0,0 15,22H22V20H15M7,15V5H17V15H7M12,6L8,10H11V14H13V10H16L12,6Z" />
          </svg>
        </span>
      `;

      const downloadIcon = `
        <span class="stat-icon down" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M15,20A1,1 0 0,0 14,19H13V17H17A2,2 0 0,0 19,15V5A2,2 0 0,0 17,3H7A2,2 0 0,0 5,5V15A2,2 0 0,0 7,17H11V19H10A1,1 0 0,0 9,20H2V22H9A1,1 0 0,0 10,23H14A1,1 0 0,0 15,22H22V20H15M7,15V5H17V15H7M12,14L16,10H13V6H11V10H8L12,14Z" />
          </svg>
        </span>
      `;

      const formatRate = (value, rateString) => {
        if (rateString) return rateString;
        if (value === undefined || value === null) return "n/a";
        return `${formatBytes(value)}/s`;
      };

      document.getElementById("live-up-icon").outerHTML = uploadIcon;
      document.getElementById("live-down-icon").outerHTML = downloadIcon;

      const renderSummary = (traffic) => {
        const summary = document.getElementById("summary");
        summary.innerHTML = "";

        cards.forEach(({ label, source }) => {
          const item = source(traffic) || {};
          const total = (item.rx || 0) + (item.tx || 0);
          const card = document.createElement("article");
          card.className = "card";
          card.innerHTML = `
            <div class="stat-label">${label}</div>
            <div class="stat-value">${formatBytes(total)} total</div>
            <div class="stat-label stat-row">${uploadIcon}<span>${formatBytes(item.tx)} up</span></div>
            <div class="stat-label stat-row">${downloadIcon}<span>${formatBytes(item.rx)} down</span></div>
          `;
          summary.appendChild(card);
        });
      };

      const renderMeta = (payload) => {
        const iface = payload.data.interfaces?.[0];
        const updated = iface?.updated;
        const updatedText = updated
          ? `${updated.date.year}-${String(updated.date.month).padStart(2, "0")}-${String(updated.date.day).padStart(2, "0")} ${String(updated.time.hour).padStart(2, "0")}:${String(updated.time.minute).padStart(2, "0")}`
          : "n/a";
        const meta = document.getElementById("meta");
        const footer = document.getElementById("footer");
        meta.textContent = `Interface: ${payload.interface || "auto"} Database: /data/vnstat`;
        footer.textContent = `Updated: ${updatedText}`;
      };

      const renderError = (message) => {
        document.getElementById("summary").innerHTML = `<article class="card error">${message}</article>`;
      };

      const renderLive = (payload) => {
        const up = payload?.tx || {};
        const down = payload?.rx || {};
        document.getElementById("live-up").textContent = formatRate(up.bytespersecond, up.ratestring);
        document.getElementById("live-down").textContent = formatRate(down.bytespersecond, down.ratestring);
      };

      const loadLive = async () => {
        try {
          const response = await fetch("./api/live", { cache: "no-store" });
          const payload = await response.json();
          if (!response.ok || payload.status !== "ok") {
            throw new Error(payload.message || "Unable to load live vnStat data");
          }
          renderLive(payload.data);
        } catch (error) {
          document.getElementById("live-up").textContent = error.message;
          document.getElementById("live-down").textContent = error.message;
        } finally {
          setTimeout(loadLive, 2000);
        }
      };

      const setActiveCliButton = (mode) => {
        document.getElementById("show-normal").classList.toggle("active", mode === "normal");
        document.getElementById("show-json").classList.toggle("active", mode === "json");
      };

      const loadCliOutput = async (mode = "normal") => {
        const output = document.getElementById("cli-output");
        const scrollY = window.scrollY;
        setActiveCliButton(mode);
        output.textContent = "Loading...";

        try {
          const response = await fetch(`./api/cli/${mode}`, { cache: "no-store" });
          const payload = await response.json();
          if (!response.ok || payload.status !== "ok") {
            throw new Error(payload.message || "Unable to load vnStat output");
          }
          output.textContent = payload.output.trim() || "(no output)";
        } catch (error) {
          output.textContent = error.message;
        }

        window.scrollTo({ top: scrollY, behavior: "auto" });
      };

      const load = async () => {
        try {
          const response = await fetch("./api/stats", { cache: "no-store" });
          const payload = await response.json();
          if (!response.ok || payload.status !== "ok") {
            throw new Error(payload.message || "Unable to load vnStat data");
          }

          const iface = payload.data.interfaces?.[0]?.traffic || {};
          renderMeta(payload);
          renderSummary(iface);
        } catch (error) {
          renderError(error.message);
        }
      };

      document.getElementById("show-normal").addEventListener("click", (event) => {
        event.preventDefault();
        loadCliOutput("normal");
      });
      document.getElementById("show-json").addEventListener("click", (event) => {
        event.preventDefault();
        loadCliOutput("json");
      });

      load();
      loadCliOutput("normal");
      loadLive();
      setInterval(load, 30000);
    </script>
  </body>
</html>

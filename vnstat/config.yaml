# https://developers.home-assistant.io/docs/apps/configuration#app-configuration
name: vnStat
version: "0.1.0"
slug: vnstat
description: Persistent vnStat traffic monitoring with an ingress dashboard
url: "https://github.com/inventor7777/vnstat-ha/tree/main/vnstat"
arch:
  - aarch64
  - amd64
init: false
startup: services
boot: auto
host_network: true
ingress: true
ingress_port: 8099
ingress_stream: true
panel_icon: mdi:chart-line
panel_title: vnStat
watchdog: "http://[HOST]:[PORT:8099]/api/health"
options:
  interface: ""
schema:
  interface: "str?"
# For local/custom repository development, leave image commented so Home Assistant
# builds from the Dockerfile in this directory instead of pulling from a registry.
# image: "ghcr.io/inventor7777/vnstat-ha"

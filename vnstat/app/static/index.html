<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>vnStat</title>
    <style>
      :root {
        --bg: #6b7280;
        --bg-deep: #4b5563;
        --panel: rgba(17, 24, 39, 0.72);
        --panel-strong: rgba(15, 23, 42, 0.86);
        --text: #f9fafb;
        --muted: #cbd5e1;
        --accent: #60a5fa;
        --line: rgba(148, 163, 184, 0.18);
        --glow: rgba(96, 165, 250, 0.24);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        font: 16px/1.5 "Avenir Next", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, rgba(96, 165, 250, 0.08), transparent 38%),
          linear-gradient(180deg, var(--bg), var(--bg-deep));
        display: grid;
        place-items: center;
      }

      main {
        width: min(1120px, calc(100vw - 32px));
        padding: 32px 0;
      }

      header {
        margin-bottom: 28px;
        text-align: center;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2.6rem, 6vw, 4.25rem);
        line-height: 0.9;
        letter-spacing: -0.04em;
      }

      p {
        margin: 8px 0 0;
        color: var(--muted);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 16px;
      }

      .card {
        background: var(--panel);
        backdrop-filter: blur(16px);
        border: 1px solid var(--line);
        border-radius: 24px;
        padding: 24px;
        box-shadow:
          0 0 0 1px rgba(96, 165, 250, 0.08),
          0 0 28px var(--glow),
          0 18px 40px rgba(15, 23, 42, 0.28);
      }

      .stat-label {
        margin-top: 14px;
        color: var(--muted);
        font-size: 15px;
      }

      .stat-value {
        margin-top: 6px;
        font-size: clamp(2rem, 4.5vw, 2.9rem);
        font-weight: 700;
        letter-spacing: -0.04em;
      }

      .section {
        margin-top: 24px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 10px 0;
        border-bottom: 1px solid var(--line);
        text-align: left;
        font-size: 14px;
      }

      th {
        color: var(--muted);
        font-weight: 600;
      }

      .meta {
        margin: 0 auto;
        max-width: 980px;
        color: var(--muted);
        font-size: 17px;
        line-height: 1.7;
      }

      footer {
        margin-top: 18px;
        text-align: center;
        color: var(--muted);
        font-size: 14px;
      }

      .error {
        color: #dbeafe;
        background: rgba(30, 41, 59, 0.72);
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 14px;
      }

      button {
        border: 1px solid rgba(96, 165, 250, 0.28);
        background: rgba(15, 23, 42, 0.78);
        color: var(--text);
        border-radius: 12px;
        padding: 10px 14px;
        font: inherit;
        cursor: pointer;
        box-shadow: 0 0 18px rgba(96, 165, 250, 0.12);
      }

      button:hover {
        background: rgba(30, 41, 59, 0.92);
      }

      button.active {
        border-color: rgba(96, 165, 250, 0.5);
        box-shadow: 0 0 22px rgba(96, 165, 250, 0.2);
      }

      pre {
        margin: 0;
        padding: 18px;
        overflow-x: auto;
        border-radius: 18px;
        background: rgba(2, 6, 23, 0.82);
        border: 1px solid var(--line);
        color: #dbeafe;
        font: 14px/1.5 "SFMono-Regular", "Menlo", "Consolas", monospace;
        white-space: pre-wrap;
      }

      h2 {
        margin: 0 0 10px;
        font-size: 1.35rem;
      }

      @media (max-width: 720px) {
        main {
          width: min(100vw - 20px, 1120px);
          padding: 20px 0;
        }

        .card {
          padding: 18px;
        }

        .meta {
          font-size: 15px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>vnStat</h1>
        <div class="meta" id="meta"></div>
      </header>

      <section class="grid" id="summary"></section>

      <section class="section card">
        <h2>Daily usage</h2>
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Received</th>
              <th>Transmitted</th>
              <th>Total</th>
            </tr>
          </thead>
          <tbody id="days"></tbody>
        </table>
      </section>

      <section class="section card">
        <h2>CLI output</h2>
        <div class="toolbar">
          <button id="show-normal" class="active" type="button">vnStat Normal</button>
          <button id="show-json" type="button">vnStat JSON</button>
          <button id="copy-output" type="button">Copy output</button>
        </div>
        <pre id="cli-output">Loading...</pre>
      </section>

      <footer id="footer"></footer>
    </main>

    <script>
      const formatBytes = (value) => {
        if (value === undefined || value === null) return "n/a";
        const units = ["B", "KiB", "MiB", "GiB", "TiB", "PiB"];
        let size = Number(value);
        let unitIndex = 0;

        while (size >= 1024 && unitIndex < units.length - 1) {
          size /= 1024;
          unitIndex += 1;
        }

        const digits = size >= 100 || unitIndex === 0 ? 0 : size >= 10 ? 1 : 2;
        return `${size.toFixed(digits)} ${units[unitIndex]}`;
      };

      const cards = [
        { label: "Today", source: (traffic) => traffic.day?.[traffic.day.length - 1] },
        { label: "Current Month", source: (traffic) => traffic.month?.[traffic.month.length - 1] },
        { label: "All Time", source: (traffic) => traffic.total },
      ];

      const renderSummary = (traffic) => {
        const summary = document.getElementById("summary");
        summary.innerHTML = "";

        cards.forEach(({ label, source }) => {
          const item = source(traffic) || {};
          const total = (item.rx || 0) + (item.tx || 0);
          const card = document.createElement("article");
          card.className = "card";
          card.innerHTML = `
            <div class="stat-label">${label}</div>
            <div class="stat-value">${formatBytes(total)} total</div>
            <div class="stat-label">${formatBytes(item.tx)} up</div>
            <div class="stat-label">${formatBytes(item.rx)} down</div>
          `;
          summary.appendChild(card);
        });
      };

      const renderDays = (days) => {
        const tbody = document.getElementById("days");
        tbody.innerHTML = "";

        days.slice(0, 14).forEach((entry) => {
          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${entry.date.year}-${String(entry.date.month).padStart(2, "0")}-${String(entry.date.day).padStart(2, "0")}</td>
            <td>${formatBytes(entry.rx)}</td>
            <td>${formatBytes(entry.tx)}</td>
            <td>${formatBytes((entry.rx || 0) + (entry.tx || 0))}</td>
          `;
          tbody.appendChild(row);
        });
      };

      const renderMeta = (payload) => {
        const iface = payload.data.interfaces?.[0];
        const updated = iface?.updated;
        const updatedText = updated
          ? `${updated.date.year}-${String(updated.date.month).padStart(2, "0")}-${String(updated.date.day).padStart(2, "0")} ${String(updated.time.hour).padStart(2, "0")}:${String(updated.time.minute).padStart(2, "0")}`
          : "n/a";
        const meta = document.getElementById("meta");
        const footer = document.getElementById("footer");
        meta.textContent = `Interface: ${payload.interface || "auto"} Database: /data/vnstat`;
        footer.textContent = `Updated: ${updatedText}`;
      };

      const renderError = (message) => {
        document.getElementById("summary").innerHTML = `<article class="card error">${message}</article>`;
      };

      const setActiveCliButton = (mode) => {
        document.getElementById("show-normal").classList.toggle("active", mode === "normal");
        document.getElementById("show-json").classList.toggle("active", mode === "json");
      };

      const loadCliOutput = async (mode = "normal") => {
        const output = document.getElementById("cli-output");
        setActiveCliButton(mode);
        output.textContent = "Loading...";

        try {
          const response = await fetch(`./api/cli/${mode}`, { cache: "no-store" });
          const payload = await response.json();
          if (!response.ok || payload.status !== "ok") {
            throw new Error(payload.message || "Unable to load vnStat output");
          }
          output.textContent = payload.output.trim() || "(no output)";
        } catch (error) {
          output.textContent = error.message;
        }
      };

      const load = async () => {
        try {
          const response = await fetch("./api/stats", { cache: "no-store" });
          const payload = await response.json();
          if (!response.ok || payload.status !== "ok") {
            throw new Error(payload.message || "Unable to load vnStat data");
          }

          const iface = payload.data.interfaces?.[0]?.traffic || {};
          renderMeta(payload);
          renderSummary(iface);
          renderDays((iface.day || []).slice().reverse());
        } catch (error) {
          renderError(error.message);
        }
      };

      const copyCliOutput = async () => {
        const output = document.getElementById("cli-output").textContent;
        const button = document.getElementById("copy-output");
        const original = button.textContent;

        try {
          await navigator.clipboard.writeText(output);
          button.textContent = "Copied";
        } catch (error) {
          button.textContent = "Copy failed";
        }

        setTimeout(() => {
          button.textContent = original;
        }, 1200);
      };

      document.getElementById("show-normal").addEventListener("click", () => loadCliOutput("normal"));
      document.getElementById("show-json").addEventListener("click", () => loadCliOutput("json"));
      document.getElementById("copy-output").addEventListener("click", copyCliOutput);

      load();
      loadCliOutput("normal");
      setInterval(load, 30000);
    </script>
  </body>
</html>
